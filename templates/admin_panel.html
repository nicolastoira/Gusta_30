<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gusta30 - Pannello Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { min-height: 100vh; background: #f0f4f8; padding-top: 50px; }
        .admin-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }
        .admin-header h2 { color: var(--primary-color); margin: 0; }
        .stage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #fafafa;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: background 0.2s;
        }
        .stage-item:hover { background: #f0f7f8; }
        .stage-info { display: flex; flex-direction: column; }
        .stage-name { font-weight: 700; color: #333; }
        .stage-status { font-size: 0.85rem; padding: 2px 8px; border-radius: 4px; width: fit-content; margin-top: 4px; }
        .status-unlocked { background: #e8f5e9; color: #2e7d32; }
        .status-locked { background: #ffebee; color: #c62828; }
        
        .actions { display: flex; gap: 10px; }
        .btn-sm { font-size: 0.85rem; padding: 6px 12px; }
        
        .logout-section { margin-top: 30px; text-align: center; }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="admin-header">
            <h2>Gestione Tappe</h2>
            <a href="/" style="font-size: 0.9rem; border: none;">← Visualizza Sito</a>
        </div>
        
        <div class="stages-list">
            {% for id, tappa in tappe.items() %}
                <div class="stage-item">
                    <div class="stage-info">
                        <span class="stage-name">Tappa {{ id }}</span>
                        <span class="stage-status {{ 'status-unlocked' if tappa.unlocked else 'status-locked' }}">
                            {{ 'Sbloccata' if tappa.unlocked else 'Bloccata' }}
                        </span>
                    </div>

                    <div class="actions">
                        {% if tappa.unlocked %}
                            <form method="POST" action="{{ url_for('lock_stage', stage_id=id) }}">
                                <button type="submit" class="btn btn-lock btn-sm">Blocca</button>
                            </form>
                        {% else %}
                            <form method="POST" action="{{ url_for('unlock_stage', stage_id=id) }}">
                                <button type="submit" class="btn btn-unlock btn-sm">Sblocca</button>
                            </form>
                        {% endif %}
                    </div>
                </div>
            {% endfor %}
        </div>

        <div class="logout-section">
            <form action="{{ url_for('logout') }}" method="GET">
                <button type="submit" class="btn btn-logout">Esci dal Pannello</button>
            </form>
        </div>
    </div>
</body>
</html>
